</div>

<div [ngClass]= "isVerified ? 'show' : 'hidden' ">
  <div class="searchdiv" [ngClass]="{'search-small': searchCompleted}">
  <p>Search for any Movie : </p>
  <input type="text" placeholder="Enter Movie Name" [(ngModel)]="MovieName"> <br>
  <button (click)="search()" >Submit</button>
</div>
<div class="forloop">
  @for(movie of MovieArray ; track $index){
    <div>
        <img src="{{movie.Poster}}" alt="{{movie.Title}}">
        <h3>{{movie.Title}}</h3>
        <h4>{{movie.Year}}</h4>
    </div>
  }
</div>

</div>
